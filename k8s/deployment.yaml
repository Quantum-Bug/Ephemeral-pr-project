apiVersion: apps/v1
kind: Deployment
metadata:
  name: ephemeral-app
  # The namespace will be dynamically set by our CI/CD script
spec:
  replicas: 1
  selectors: 
  matchLabels:
    app: ephemeral-app
  template:
    metadata:
      labels:
        app: ephemeral-app
    spec:
      containers:
      - name: app
        image: your-docker-username/ephemeral-app:latest
        ports:
        - containerPort: 8000
        env:
        - name: PR_NUMBER
          value: "REPLACE_ME_WITH_PR_NUMBER" # We will swap this using 'sed' in CI
---
apiVersion: v1
kind: Service
metadata:
  name: ephemeral-service
spec:
  selector:
    app: ephemeral-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
